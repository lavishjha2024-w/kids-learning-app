name: kids_learning_app
description: A Flutter-based mobile learning app for kids (Age 4–10) with HCI principles, eye-friendly design, and mental health focus.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Audio & Text-to-Speech
  flutter_tts: ^4.0.2
  audioplayers: ^5.2.1
  
  # Animations
  lottie: ^2.7.0
  flutter_animate: ^4.2.0+1
  
  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/audio/
    - assets/fonts/
  
  fonts:
    - family: KidsFont
      fonts:
        - asset: assets/fonts/kids_font.ttf
